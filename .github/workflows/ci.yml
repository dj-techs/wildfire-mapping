name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Generate dummy data
        run: python scripts/generate_dummy_data.py
      - name: Test
        run: pytest -q
      - name: Smoke import
        run: python -c "from app.server import app, server; print('OK')"
